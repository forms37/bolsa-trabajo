<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bolsa laboral para psicólogos en Perú | Lidera</title>

  <meta name="description"
        content="Encuentra oportunidades laborales para psicólogos, educadores y profesionales de la salud en Perú. Vacantes actualizadas diariamente.">

  <meta name="keywords"
        content="psicólogos, empleo psicología, bolsa laboral, vacantes psicólogos, trabajo psicólogo Perú, salud mental">

  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<header class="header">
  <div class="contenedor">

    <h1>Bolsa laboral Lidera</h1>

    <p>
      Oportunidades para psicólogos, educadores y profesionales de la salud.
    </p>

    <div class="buscador">

      <input
        type="text"
        id="buscar"
        placeholder="Buscar cargo, institución o ciudad">

      <select id="filtroCiudad">
        <option value="">Todas las ciudades</option>
      </select>

      <select id="filtroModalidad">
        <option value="">Todas las modalidades</option>
      </select>

      <select id="filtroJornada">
        <option value="">Todas las jornadas</option>
      </select>

    </div>

    <div id="contador"></div>

  </div>
</header>

<main class="contenedor">

  <section id="vacantes"></section>

</main>

<script src="js/app.js"></script>

</body>
</html>
